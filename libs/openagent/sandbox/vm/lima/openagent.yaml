# =============================================================================
# Lima VM config: CLI-based sandbox for LLM Agent execution
# =============================================================================
# Multi-session sandbox for LLM agents. Each agent gets an isolated Linux user
# under /sessions/<name>/. System packages are world-readable; session home
# directories are restricted (750) via UMASK 027 set AFTER provisioning.
#
# IMPORTANT: UMASK 027 is set in the LAST provisioning step so that all
# package installations (pip, npm, apt, playwright) run with the default
# umask 022, producing world-readable files (755 dirs, 644 files). The UMASK
# change only affects future SSH sessions (session user home directory creation).
#
# Usage:
#   limactl start --name=openagent openagent.yaml
#   limactl shell openagent
#   limactl stop openagent
#   limactl delete openagent
# =============================================================================

# --- VM Engine ---
vmType: "vz"
mountType: "virtiofs"

# --- Base Image (Ubuntu Minimal 24.04 LTS) ---
images:
  - location: "https://cloud-images.ubuntu.com/minimal/releases/noble/release/ubuntu-24.04-minimal-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/minimal/releases/noble/release/ubuntu-24.04-minimal-cloudimg-arm64.img"
    arch: "aarch64"

# --- Resources ---
cpus: 4
memory: "8GiB"
disk: "50GiB"

# --- User ---
user:
  name: "openagent"

# --- Mounts ---
mounts: []

# --- Environments ---
env:
  PYTHONUNBUFFERED: "1"
  PLAYWRIGHT_BROWSERS_PATH: "/opt/pw-browsers"

# --- Network ---
networks: []

# --- Port Forwarding ---
portForwards:
  - guestPortRange: [1, 65535]
    hostIP: "127.0.0.1"

# --- Containerd ---
containerd:
  system: false
  user: false

# =============================================================================
# Provisioning Scripts
#
# ORDERING: All package installations (Steps 1-6) run BEFORE the UMASK change
# (Step 7). Lima runs each step as a new SSH session, and PAM reads
# /etc/login.defs at session start. By leaving UMASK at the default 022
# during Steps 1-6, all installed files are world-readable without any
# chmod workarounds.
# =============================================================================

provision:
  # -------------------------------------------------------------------------
  # Step 0: Base prerequisites
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update
      apt-get install -y --no-install-recommends \
        ca-certificates \
        curl \
        gnupg

  # -------------------------------------------------------------------------
  # Step 1: Node.js 22.x from NodeSource
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      NODE_MAJOR=22

      # --- Attempt 1: NodeSource apt repo (retried) ---
      nodesource_ok=false
      for attempt in 1 2 3; do
        echo ">>> NodeSource setup attempt $attempt/3"
        if curl -fsSL --retry 3 --retry-delay 5 "https://deb.nodesource.com/setup_${NODE_MAJOR}.x" | bash -; then
          if apt-get install -y nodejs; then
            nodesource_ok=true
            break
          fi
        fi
        echo ">>> Attempt $attempt failed. Retrying in $((attempt * 5))s..."
        sleep $((attempt * 5))
      done

      # --- Attempt 2: Official binary tarball (if NodeSource failed) ---
      if [ "$nodesource_ok" = false ]; then
        echo ">>> NodeSource failed after 3 attempts. Falling back to official binary tarball..."

        # Remove any partial Ubuntu nodejs that may have been pulled in
        apt-get remove -y nodejs npm 2>/dev/null || true

        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  NODE_ARCH="x64" ;;
          aarch64) NODE_ARCH="arm64" ;;
          *)       echo ">>> ERROR: Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        # Fetch the latest v22 version string from the index
        NODE_VERSION=$(curl -fsSL --retry 3 "https://nodejs.org/dist/latest-v${NODE_MAJOR}.x/" \
          | grep -oP 'node-v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)

        if [ -z "$NODE_VERSION" ]; then
          echo ">>> ERROR: Could not determine latest Node.js ${NODE_MAJOR}.x version"
          exit 1
        fi

        TARBALL="node-v${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz"
        URL="https://nodejs.org/dist/v${NODE_VERSION}/${TARBALL}"

        echo ">>> Downloading Node.js v${NODE_VERSION} for ${NODE_ARCH}..."
        curl -fsSL --retry 3 --retry-delay 5 -o "/tmp/${TARBALL}" "$URL"
        tar -xJf "/tmp/${TARBALL}" -C /usr/local --strip-components=1
        rm -f "/tmp/${TARBALL}"
      fi

      # --- Verify that both node and npm are available ---
      echo ">>> Verifying installation..."
      node --version
      npm --version

      if ! command -v npm >/dev/null 2>&1; then
        echo ">>> ERROR: npm is not available after Node.js installation"
        exit 1
      fi

      echo ">>> Node.js $(node --version) with npm $(npm --version) installed successfully."

  # -------------------------------------------------------------------------
  # Step 2: System packages (core utils, Python, Java, PDF, LaTeX, fonts...)
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -ux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt_install() {
        local max_attempts=5
        local delay=3
        local attempt=1

        while [ $attempt -le $max_attempts ]; do
          echo ">>> apt-get install attempt $attempt/$max_attempts"

          # On first attempt, do a normal install.
          # On retries, use --fix-missing to only fetch what's missing
          # from the apt cache, avoiding re-downloading everything.
          if [ $attempt -eq 1 ]; then
            apt-get install -y --no-install-recommends "$@" && return 0
          else
            apt-get install -y --no-install-recommends --fix-missing "$@" && return 0
          fi

          echo ">>> Attempt $attempt failed. Retrying in ${delay}s..."
          sleep $delay

          # Recover from partial installs / broken dpkg state before retrying
          dpkg --configure -a || true
          apt-get install -y -f || true

          delay=$((delay * 2))
          attempt=$((attempt + 1))
        done

        # Final fallback: download packages one at a time, then install.
        # This isolates which package is actually unreachable.
        echo ">>> Bulk install failed. Falling back to per-package download..."

        # Ensure clean dpkg state before per-package attempts
        dpkg --configure -a || true
        apt-get install -y -f || true

        local pkg
        for pkg in "$@"; do
          local pkg_attempt=1
          while [ $pkg_attempt -le 3 ]; do
            if apt-get install -y --no-install-recommends -d "$pkg" 2>/dev/null; then
              break
            fi
            echo ">>> Download failed for $pkg (attempt $pkg_attempt/3)"
            sleep $((pkg_attempt * 2))
            pkg_attempt=$((pkg_attempt + 1))
          done
        done

        # Now install from cache — all .debs should be local
        echo ">>> Installing all packages from local cache..."
        if apt-get install -y --no-install-recommends "$@"; then
          return 0
        fi

        echo ">>> ERROR: apt-get install failed after all retries"
        echo ">>> Failed packages: $*"
        return 1
      }

      apt-get update

      apt_install \
        bash \
        coreutils \
        wget \
        curl \
        git \
        zip \
        unzip \
        bzip2 \
        xz-utils \
        file \
        findutils \
        patch \
        perl \
        jq \
        tree \
        sqlite3 \
        ripgrep \
        netcat-openbsd \
        apt-transport-https \
        software-properties-common

      apt_install \
        build-essential \
        pkg-config

      apt_install \
        python3 \
        python3-dev \
        python3-pip \
        python3-venv \
        pipx

      apt_install \
        default-jre-headless

      apt_install \
        poppler-utils \
        qpdf \
        pdftk-java \
        wkhtmltopdf \
        ghostscript

      apt_install \
        pandoc

      apt_install \
        libreoffice-writer \
        libreoffice-calc \
        libreoffice-impress \
        libreoffice-common \
        libreoffice-java-common

      apt_install \
        imagemagick \
        graphviz \
        ffmpeg

      apt_install \
        tesseract-ocr \
        tesseract-ocr-eng

      apt_install \
        texlive-base \
        texlive-latex-base \
        texlive-latex-recommended \
        texlive-latex-extra \
        texlive-fonts-recommended \
        texlive-xetex \
        texlive-science \
        texlive-pictures \
        latexmk

      apt_install \
        fonts-liberation2 \
        fonts-dejavu \
        fonts-freefont-ttf \
        fonts-noto-cjk \
        fonts-noto-color-emoji \
        fonts-crosextra-caladea \
        fonts-crosextra-carlito \
        fonts-lmodern \
        fonts-texgyre \
        fonts-opensymbol \
        fonts-wqy-zenhei \
        fonts-ipafont-gothic

      apt_install \
        xvfb \
        x11-xkb-utils \
        xfonts-scalable \
        xfonts-cyrillic \
        xfonts-utils

      apt_install \
        libnss3 \
        libnss3-tools \
        libatk1.0-0t64 \
        libatk-bridge2.0-0t64 \
        libcups2t64 \
        libdrm2 \
        libxkbcommon0 \
        libxcomposite1 \
        libxdamage1 \
        libxfixes3 \
        libxrandr2 \
        libgbm1 \
        libasound2t64 \
        libpango-1.0-0 \
        libcairo2 \
        libatspi2.0-0t64 \
        libgtk-3-0t64 \
        libgtk-4-1

      apt_install \
        libffi-dev \
        zlib1g-dev \
        libpng-dev \
        libfreetype-dev \
        libcairo2-dev \
        libglib2.0-dev \
        libbz2-dev

      rm -rf /var/lib/apt/lists/*
      apt-get autoremove -y
      apt-get clean

      # Verify nothing is left broken
      if ! dpkg --audit 2>/dev/null || dpkg -l | grep -q '^iF'; then
        echo ">>> WARNING: Some packages are in a broken state"
        dpkg -l | grep '^iF' || true
        exit 1
      fi

  # -------------------------------------------------------------------------
  # Step 3: NPM global packages
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      npm install -g \
        docx@9 \
        pptxgenjs@4.0.1 \
        pdf-lib@1.17.1 \
        pdfjs-dist \
        marked \
        markdown-toc \
        markdownlint-cli \
        markdownlint-cli2 \
        remark-cli \
        remark-preset-lint-recommended \
        @mermaid-js/mermaid-cli \
        graphviz \
        react \
        react-dom \
        react-icons \
        typescript \
        ts-node \
        tsx \
        sharp \
        playwright

      if [ "$(uname -m)" = "x86_64" ]; then
        npm install -g markdown-pdf
      fi

  # -------------------------------------------------------------------------
  # Step 4: Python packages
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail


      pip_install() {
        local max_attempts=5
        local delay=5
        local attempt=1
        local pip_opts=(
          --break-system-packages
          --timeout 120
          --retries 3
        )

        while [ $attempt -le $max_attempts ]; do
          echo ">>> pip install attempt $attempt/$max_attempts (${#} packages)"
          if pip3 install "${pip_opts[@]}" "$@"; then
            return 0
          fi
          echo ">>> Attempt $attempt failed. Retrying in ${delay}s..."
          sleep $delay
          delay=$((delay * 2))
          attempt=$((attempt + 1))
        done

        # Final fallback: install one at a time to isolate failures
        echo ">>> Batch install failed. Falling back to per-package install..."
        local pkg failed=()
        for pkg in "$@"; do
          local pkg_attempt=1
          local pkg_ok=false
          while [ $pkg_attempt -le 3 ]; do
            if pip3 install "${pip_opts[@]}" "$pkg" 2>&1; then
              pkg_ok=true
              break
            fi
            echo ">>> Failed: $pkg (attempt $pkg_attempt/3)"
            sleep $((pkg_attempt * 3))
            pkg_attempt=$((pkg_attempt + 1))
          done
          if [ "$pkg_ok" = false ]; then
            failed+=("$pkg")
          fi
        done

        if [ ${#failed[@]} -gt 0 ]; then
          echo ">>> ERROR: These packages failed after all retries:"
          printf '>>>   %s\n' "${failed[@]}"
          return 1
        fi
        return 0
      }

      # -------------------------------------------------------------------
      # Pre-flight: fix blinker conflict with system Flask
      # -------------------------------------------------------------------
      pip3 install --break-system-packages --timeout 120 --ignore-installed blinker

      # -------------------------------------------------------------------
      # Batch 1: Core numeric / scientific
      # These are large wheels — isolate them so timeouts don't take
      # down smaller packages.
      # -------------------------------------------------------------------
      pip_install \
        numpy \
        pandas \
        scipy \
        sympy

      # -------------------------------------------------------------------
      # Batch 2: ML / CV (heavy downloads, especially OpenCV ~70MB each)
      # -------------------------------------------------------------------
      pip_install \
        scikit-learn \
        scikit-image \
        onnxruntime

      pip_install \
        opencv-python \
        opencv-contrib-python \
        opencv-python-headless

      # -------------------------------------------------------------------
      # Batch 3: Visualization
      # -------------------------------------------------------------------
      pip_install \
        matplotlib \
        seaborn \
        networkx

      # -------------------------------------------------------------------
      # Batch 4: Image / media processing
      # -------------------------------------------------------------------
      pip_install \
        pillow \
        imageio \
        imageio-ffmpeg \
        Wand \
        pytesseract

      # -------------------------------------------------------------------
      # Batch 5: PDF tools
      # -------------------------------------------------------------------
      pip_install \
        pdfplumber \
        pdfminer.six \
        pypdf \
        pikepdf \
        pdf2image \
        pdfkit \
        img2pdf \
        camelot-py \
        tabula-py \
        reportlab \
        pypdfium2

      # -------------------------------------------------------------------
      # Batch 6: Office document formats
      # -------------------------------------------------------------------
      pip_install \
        python-docx \
        python-pptx \
        openpyxl \
        xlsxwriter \
        odfpy

      # -------------------------------------------------------------------
      # Batch 7: Markdown / docs ecosystem
      # -------------------------------------------------------------------
      pip_install \
        markitdown \
        markdownify \
        markdown \
        grip \
        mistune \
        markdown-it-py \
        marko \
        mkdocs \
        mkdocs-material \
        mkdocs-material-extensions \
        mkdocs-get-deps \
        pymdown-extensions

      # -------------------------------------------------------------------
      # Batch 8: Web / HTTP
      # -------------------------------------------------------------------
      pip_install \
        requests \
        beautifulsoup4 \
        lxml \
        Flask \
        httplib2

      # -------------------------------------------------------------------
      # Batch 9: Automation / browser
      # -------------------------------------------------------------------
      pip_install \
        playwright \
        unoserver \
        pyoo

      # -------------------------------------------------------------------
      # Batch 10: System / utility libraries
      # -------------------------------------------------------------------
      pip_install \
        uv \
        magika \
        click \
        colorama \
        coloredlogs \
        humanfriendly \
        tabulate \
        python-dotenv \
        psutil \
        watchdog \
        sounddevice \
        pycairo \
        graphviz \
        freetype-py

      # -------------------------------------------------------------------
      # Batch 11: Foundational / low-level (many already installed as
      # transitive deps — pip will no-op, but this ensures they're present)
      # -------------------------------------------------------------------
      pip_install \
        attrs \
        bcrypt \
        jsonschema \
        python-magic \
        livereload \
        tornado \
        PyYAML \
        certifi \
        charset-normalizer \
        cryptography \
        defusedxml \
        idna \
        joblib \
        packaging \
        protobuf \
        python-dateutil \
        pytz \
        typing_extensions \
        urllib3

      # -------------------------------------------------------------------
      # Platform-specific
      # -------------------------------------------------------------------
      if [ "$(uname -m)" = "x86_64" ]; then
        pip_install "mediapipe>=0.10.32"
      fi

      # -------------------------------------------------------------------
      # Cleanup: purge pip cache now that everything is installed
      # -------------------------------------------------------------------
      pip3 cache purge
      rm -rf /root/.cache/pip /tmp/pip-*

      echo ">>> All Python packages installed successfully."

  # -------------------------------------------------------------------------
  # Step 5: Playwright browsers + ImageMagick policy
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Recover any broken dpkg/apt state left over from prior steps
      dpkg --configure -a || true
      apt-get install -y -f || true

      # Install Playwright OS deps (apt) — retry-wrapped
      max_attempts=5
      attempt=1
      while [ $attempt -le $max_attempts ]; do
        echo ">>> playwright install-deps attempt $attempt/$max_attempts"
        if npx playwright install-deps chromium; then
          break
        fi
        echo ">>> Retrying in 5s..."
        sleep 5
        dpkg --configure -a || true
        apt-get install -y -f || true
        apt-get update || true
        attempt=$((attempt + 1))
      done

      # Download browser binary (HTTPS, not apt)
      PLAYWRIGHT_BROWSERS_PATH=/opt/pw-browsers npx playwright install chromium

      # Allow PDF operations in ImageMagick (only if restricted)
      if [ -f /etc/ImageMagick-6/policy.xml ] && grep -q 'rights="none" pattern="PDF"' /etc/ImageMagick-6/policy.xml; then
        sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
      fi

  # -------------------------------------------------------------------------
  # Step 6: Symlink & Session Directory
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Symlink
      ln -sf /usr/bin/python3 /usr/bin/python

      # Session Directory
      mkdir -p /sessions
      chmod 755 /sessions
